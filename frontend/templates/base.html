<!doctype html>
<html lang="{{ lang|default('en') }}" class="h-full">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}KisanVision 360{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'ui-sans-serif', 'system-ui', 'Segoe UI', 'Roboto', 'Helvetica', 'Arial'],
            },
          },
        },
      };
    </script>

    {% block head %}{% endblock %}
  </head>
  <body class="min-h-screen bg-gray-50 text-gray-900 dark:bg-gray-950 dark:text-gray-50 font-sans flex flex-col">
    <header class="sticky top-0 z-50 border-b border-gray-200/80 bg-white/80 backdrop-blur dark:bg-gray-950/70 dark:border-gray-800">
      <div class="mx-auto max-w-7xl px-6">
        <div class="flex h-16 items-center gap-6">
          <a href="/" class="flex items-center gap-2 font-semibold tracking-tight text-gray-900 dark:text-gray-50">
            <span class="inline-block h-2.5 w-2.5 rounded-sm bg-emerald-500"></span>
            <span>KisanVision 360</span>
          </a>

          <nav class="hidden flex-1 items-center justify-center gap-1 sm:flex" aria-label="Primary">
            <a href="/" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 dark:text-gray-300 dark:hover:text-gray-50 transition-all duration-200" data-i18n="nav.home">Home</a>
            <a href="/disease" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 dark:text-gray-300 dark:hover:text-gray-50 transition-all duration-200" data-i18n="nav.disease">Disease</a>
            <a href="/dashboard" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 dark:text-gray-300 dark:hover:text-gray-50 transition-all duration-200" data-i18n="nav.lifecycle">Lifecycle</a>
            <a href="/market" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 dark:text-gray-300 dark:hover:text-gray-50 transition-all duration-200" data-i18n="nav.postharvest">Post‑Harvest</a>
          </nav>

          <div class="ml-auto flex items-center gap-3">
            <!-- Logged-in Farmer Name + Logout -->
            <div id="user-info" class="hidden items-center gap-2">
              <span id="logged-farmer-name" class="text-xs font-medium text-emerald-700 dark:text-emerald-300">👨‍🌾</span>
              <button onclick="window.farmerLogout()" class="rounded-md border border-red-200 bg-red-50 px-2 py-1 text-xs font-medium text-red-700 hover:bg-red-100 dark:border-red-800 dark:bg-red-900/30 dark:text-red-300 dark:hover:bg-red-900/50 transition-all">
                Logout
              </button>
            </div>

            <!-- Language Selector -->
            <div class="relative">
              <select id="language-select" class="appearance-none rounded-md border border-gray-200 bg-white pl-3 pr-7 py-1.5 text-xs font-medium text-gray-700 shadow-sm cursor-pointer focus:outline-none focus:ring-2 focus:ring-emerald-500 dark:border-gray-800 dark:bg-gray-900 dark:text-gray-200">
                <option value="en">🇬🇧 English</option>
                <option value="hi">🇮🇳 हिंदी</option>
                <option value="te">🇮🇳 తెలుగు</option>
              </select>
              <span class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none text-[10px]">▼</span>
            </div>

            <div id="backend-status" class="inline-flex items-center gap-2 rounded-md border border-gray-200 bg-white px-3 py-1.5 text-xs font-medium text-gray-700 shadow-sm dark:border-gray-800 dark:bg-gray-900 dark:text-gray-200">
              <span class="inline-block h-2 w-2 rounded-full bg-gray-400" aria-hidden="true"></span>
              <span data-i18n="backend.checking">Checking</span>
            </div>

            <button id="theme-toggle" type="button" class="rounded-md border border-gray-200 bg-white px-3 py-1.5 text-xs font-semibold text-gray-700 shadow-sm hover:bg-gray-50 dark:border-gray-800 dark:bg-gray-900 dark:text-gray-200 dark:hover:bg-gray-800 transition-all duration-200">
              Theme
            </button>
          </div>
        </div>
      </div>
    </header>

    <main class="flex-1">
      {% block content %}{% endblock %}
    </main>

    <footer class="border-t border-gray-200 bg-white dark:border-gray-800 dark:bg-gray-950">
      <div class="mx-auto max-w-7xl px-6 py-6 text-sm text-gray-500 dark:text-gray-400">
        <div class="flex flex-col gap-1 sm:flex-row sm:items-center sm:justify-between">
          <div data-i18n="footer.copyright">© {{ current_year|default(2026) }} KisanVision 360</div>
          <div class="text-gray-400 dark:text-gray-500" data-i18n="footer.tagline">Secure monitoring • Edge + Cloud ready</div>
        </div>
      </div>
    </footer>

    <script src="/static/saas_common.js?v=11"></script>
    <script src="/static/chatbot_widget.js?v=1"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
